name: Release UDO Plugin

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=${TAG}"         >> "${GITHUB_OUTPUT}"
          echo "VERSION=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Tag: ${TAG} | Version: ${VERSION}"

      - name: Build .txz package
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PKG_NAME="unraid-docker-orchestrator-${VERSION}-x86_64-1"
          PKG_DIR="/tmp/pkg_build"

          mkdir -p "${PKG_DIR}/usr/local/emhttp/plugins/unraid-docker-orchestrator/include"
          mkdir -p "${PKG_DIR}/usr/local/emhttp/plugins/unraid-docker-orchestrator/js"
          mkdir -p "${PKG_DIR}/usr/local/emhttp/plugins/unraid-docker-orchestrator/css"
          mkdir -p "${PKG_DIR}/usr/local/emhttp/plugins/unraid-docker-orchestrator/scripts"
          mkdir -p "${PKG_DIR}/usr/local/emhttp/plugins/unraid-docker-orchestrator/icons"
          mkdir -p "${PKG_DIR}/usr/local/emhttp/plugins/unraid-docker-orchestrator/images"
          mkdir -p "${PKG_DIR}/install"

          PLUGIN_SRC="unraid-docker-orchestrator"
          PLUGIN_DEST="${PKG_DIR}/usr/local/emhttp/plugins/unraid-docker-orchestrator"

          cp "${PLUGIN_SRC}/UDO.page"                    "${PLUGIN_DEST}/"
          cp "${PLUGIN_SRC}/include/ajax.php"            "${PLUGIN_DEST}/include/"
          cp "${PLUGIN_SRC}/css/udo.css"                 "${PLUGIN_DEST}/css/"
          cp "${PLUGIN_SRC}/js/"*.js                     "${PLUGIN_DEST}/js/"
          cp "${PLUGIN_SRC}/scripts/udo-check.sh"        "${PLUGIN_DEST}/scripts/"
          cp "${PLUGIN_SRC}/scripts/udo_update_one.php"  "${PLUGIN_DEST}/scripts/"
          cp "${PLUGIN_SRC}/udo-icon.png"                "${PLUGIN_DEST}/"
          cp "${PLUGIN_SRC}/icons/"*.png                 "${PLUGIN_DEST}/icons/"  2>/dev/null || true
          cp "${PLUGIN_SRC}/images/"*.png                "${PLUGIN_DEST}/images/" 2>/dev/null || true
          cp install.sh   "${PLUGIN_DEST}/install.sh"
          cp uninstall.sh "${PLUGIN_DEST}/uninstall.sh"
          chmod 755 "${PLUGIN_DEST}/install.sh"
          chmod 755 "${PLUGIN_DEST}/uninstall.sh"
          chmod 755 "${PLUGIN_DEST}/scripts/udo-check.sh"
          chmod 755 "${PLUGIN_DEST}/scripts/udo_update_one.php"

          printf '%s\n' \
            'chmod 755 /usr/local/emhttp/plugins/unraid-docker-orchestrator/install.sh' \
            'chmod 755 /usr/local/emhttp/plugins/unraid-docker-orchestrator/uninstall.sh' \
            'chmod 755 /usr/local/emhttp/plugins/unraid-docker-orchestrator/scripts/udo-check.sh' \
            'chmod 755 /usr/local/emhttp/plugins/unraid-docker-orchestrator/scripts/udo_update_one.php' \
            > "${PKG_DIR}/install/doinst.sh"

          printf '%s\n' \
            'unraid-docker-orchestrator: Unraid Docker Orchestrator (UDO)' \
            'unraid-docker-orchestrator:' \
            'unraid-docker-orchestrator: Manage Docker container startup order,' \
            'unraid-docker-orchestrator: dependencies, and automatic updates on Unraid.' \
            'unraid-docker-orchestrator:' \
            'unraid-docker-orchestrator: Author  : Parralex-Labs' \
            'unraid-docker-orchestrator: License : GPL v3' \
            'unraid-docker-orchestrator: GitHub  : https://github.com/Parralex-Labs/Unraid-Docker-Orchestrator' \
            'unraid-docker-orchestrator:' \
            > "${PKG_DIR}/install/slack-desc"

          cd "${PKG_DIR}"
          tar --create \
              --file="/tmp/${PKG_NAME}.txz" \
              --use-compress-program=xz \
              --owner=root --group=root \
              .

          echo "PKG_NAME=${PKG_NAME}" >> "${GITHUB_ENV}"
          echo "Package: ${PKG_NAME}.txz ($(du -sh /tmp/${PKG_NAME}.txz | cut -f1))"

      - name: Compute MD5
        id: md5
        run: |
          MD5=$(md5sum "/tmp/${{ env.PKG_NAME }}.txz" | cut -d' ' -f1)
          echo "MD5=${MD5}" >> "${GITHUB_OUTPUT}"
          echo "MD5: ${MD5}"

      - name: Generate udo.plg and copy txz to archive
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          MD5: ${{ steps.md5.outputs.MD5 }}
        run: |
          mkdir -p archive plugin
          cp "/tmp/${{ env.PKG_NAME }}.txz" "archive/${{ env.PKG_NAME }}.txz"
          V="${VERSION}" M="${MD5}"
          {
            printf '%s\n' '<?xml version="1.0" standalone="yes"?>'
            printf '%s\n' '<!DOCTYPE PLUGIN ['
            printf '%s\n' '<!ENTITY name         "unraid-docker-orchestrator">'
            printf '%s\n' '<!ENTITY author       "Parralex-Labs">'
            printf "<!ENTITY version      \"%s\">\n" "${V}"
            printf "<!ENTITY md5          \"%s\">\n" "${M}"
            printf '%s\n' '<!ENTITY github       "Parralex-Labs/Unraid-Docker-Orchestrator">'
            printf '%s\n' '<!ENTITY pluginURL    "https://raw.githubusercontent.com/&github;/main/plugin/udo.plg">'
            printf '%s\n' '<!ENTITY pluginpkg    "&name;-&version;-x86_64-1.txz">'
            printf '%s\n' ']>'
            printf '%s\n' ''
            printf '%s\n' '<PLUGIN name="&name;"'
            printf '%s\n' '        author="&author;"'
            printf '%s\n' '        version="&version;"'
            printf '%s\n' '        pluginURL="&pluginURL;"'
            printf '%s\n' '        support="https://github.com/Parralex-Labs/Unraid-Docker-Orchestrator/issues"'
            printf '%s\n' '        min="7.0.0"'
            printf '%s\n' '        icon="tasks">'
            printf '%s\n' ''
            printf '%s\n' '<CHANGES>'
            printf '%s\n' '## Unraid Docker Orchestrator'
            printf "### %s\n" "${V}"
            printf '%s\n' '- See https://github.com/Parralex-Labs/Unraid-Docker-Orchestrator/releases'
            printf '%s\n' '</CHANGES>'
            printf '%s\n' ''
            printf '%s\n' ''
            printf '%s\n' '<FILE Name="/boot/config/plugins/&name;/&name;-&version;-x86_64-1.txz" Run="upgradepkg --install-new">'
            printf '%s\n' '<URL>https://raw.githubusercontent.com/&github;/main/archive/&pluginpkg;</URL>'
            printf '%s\n' '<MD5>&md5;</MD5>'
            printf '%s\n' '</FILE>'
            printf '%s\n' ''
            printf '%s\n' '<FILE Run="/bin/bash">'
            printf '%s\n' '<INLINE>'
            printf '%s\n' 'INSTALL_SH="/usr/local/emhttp/plugins/unraid-docker-orchestrator/install.sh"'
            printf '%s\n' 'if [ -f "$INSTALL_SH" ]; then'
            printf '%s\n' '  bash "$INSTALL_SH"'
            printf '%s\n' 'else'
            printf '%s\n' '  echo "ERROR: install.sh not found"'
            printf '%s\n' '  exit 1'
            printf '%s\n' 'fi'
            printf '%s\n' '</INLINE>'
            printf '%s\n' '</FILE>'
            printf '%s\n' ''
            printf '%s\n' '<FILE Run="/bin/bash" Method="remove">'
            printf '%s\n' '<INLINE>'
            printf '%s\n' 'UNINSTALL_SH="/usr/local/emhttp/plugins/unraid-docker-orchestrator/uninstall.sh"'
            printf '%s\n' 'if [ -f "$UNINSTALL_SH" ]; then'
            printf '%s\n' '  bash "$UNINSTALL_SH"'
            printf '%s\n' 'else'
            printf '%s\n' '  rm -rf /usr/local/emhttp/plugins/unraid-docker-orchestrator'
            printf '%s\n' '  rm -rf /boot/config/plugins/unraid-docker-orchestrator'
            printf '%s\n' 'fi'
            printf '%s\n' 'removepkg unraid-docker-orchestrator 2>/dev/null || true'
            printf '%s\n' '</INLINE>'
            printf '%s\n' '</FILE>'
            printf '%s\n' ''
            printf '%s\n' '</PLUGIN>'
          } > plugin/udo.plg
          echo "Generated plugin/udo.plg:"
          grep -E "version|md5|URL" plugin/udo.plg | head -5

      - name: Commit archive and udo.plg to main
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ plugin/udo.plg
          git commit -m "release: ${VERSION}" || echo "Nothing to commit"
          git push origin HEAD:main

      - name: Upload .txz to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/${{ env.PKG_NAME }}.txz
